<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portfolio Image Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
:root{--ink:#0c0b0a;--cream:#f5f2ec;--warm:#ede9e0;--gold:#c9a84c;--mono:'DM Mono',monospace;--sans:'Plus Jakarta Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}body{font-family:var(--sans);background:var(--ink);color:var(--cream);min-height:100vh;}
#drop-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:40px;text-align:center;}
#dz{width:100%;max-width:480px;border:2px dashed rgba(201,168,76,.3);border-radius:14px;padding:50px 36px;cursor:pointer;transition:all .2s;}
#dz:hover,#dz.over{border-color:var(--gold);background:rgba(201,168,76,.05);}
.dz-ico{font-size:40px;margin-bottom:14px;opacity:.5;}
.dz-t{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.dz-s{font-size:13px;color:rgba(255,255,255,.36);line-height:1.6;}
#fi{display:none;}
.dbtn{margin-top:18px;display:inline-flex;align-items:center;gap:7px;background:var(--gold);color:var(--ink);font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:10px 20px;border-radius:6px;cursor:pointer;border:none;font-weight:600;}
#drop-screen h1{font-size:24px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px;}
#drop-screen>p{font-size:12px;color:rgba(255,255,255,.26);max-width:340px;}
#main{display:none;min-height:100vh;}
.hdr{background:rgba(12,11,10,.98);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:100;}
.hdr-l{display:flex;align-items:center;gap:12px;}
.hdr-logo{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
#pill{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:rgba(201,168,76,.08);color:var(--gold);}
.hbtn{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:7px 14px;border-radius:5px;border:none;cursor:pointer;font-weight:500;}
.hbtn-o{background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);}
.hbtn-o:hover{border-color:rgba(255,255,255,.28);color:#fff;}
.hbtn-p{background:var(--gold);color:var(--ink);}
.hbtn-p:hover{opacity:.85;}
.hbtn-p:disabled{opacity:.28;cursor:not-allowed;}
.layout{display:flex;height:calc(100vh - 54px);}
.sb{width:204px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.07);overflow-y:auto;padding:10px 0;}
.sb-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.18);padding:9px 14px 3px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.4);border-left:3px solid transparent;transition:all .1s;}
.sb-item:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.7);}
.sb-item.active{background:rgba(201,168,76,.07);color:var(--cream);border-left-color:var(--gold);}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-cnt{margin-left:auto;font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.18);}
.ct{flex:1;overflow-y:auto;padding:20px 24px;background:#131110;}
.ct-hdr{margin-bottom:16px;}
.ct-title{font-size:17px;font-weight:700;letter-spacing:-.02em;margin-bottom:3px;}
.ct-sub{font-size:11px;color:rgba(255,255,255,.26);font-family:var(--mono);letter-spacing:.05em;margin-bottom:14px;}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.fb{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 11px;border-radius:4px;border:1px solid rgba(255,255,255,.07);background:transparent;color:rgba(255,255,255,.3);cursor:pointer;}
.fb:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.6);}
.fb.on{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:var(--gold);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;overflow:hidden;cursor:pointer;transition:all .15s;position:relative;}
.card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.4);}
.card:hover .ov{opacity:1;}
.thumb{position:relative;padding-bottom:60%;overflow:hidden;background:rgba(255,255,255,.03);}
.thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:rgba(201,168,76,.03);border-bottom:1px dashed rgba(201,168,76,.2);}
.ph-ico{font-size:22px;opacity:.15;}
.ph-code{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(201,168,76,.55);background:rgba(201,168,76,.07);padding:3px 7px;border-radius:3px;}
.ph-lbl{font-size:10px;color:rgba(255,255,255,.2);text-align:center;padding:0 10px;line-height:1.3;max-width:160px;}
.ov{position:absolute;inset:0;background:rgba(12,11,10,.72);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.ov-btn{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;background:var(--gold);color:var(--ink);padding:7px 14px;border-radius:4px;font-weight:600;}
.info{padding:10px 12px;}
.lbl{font-size:11px;font-weight:500;color:rgba(255,255,255,.6);line-height:1.3;margin-bottom:3px;}
.sec{font-family:var(--mono);font-size:8px;letter-spacing:.06em;color:rgba(255,255,255,.2);text-transform:uppercase;}
.bdg{position:absolute;top:7px;right:7px;font-family:var(--mono);font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:3px;font-weight:600;}
.b-set{background:rgba(74,222,128,.1);color:#4ade80;}
.b-empty{background:rgba(250,204,21,.08);color:#facc15;}
.b-chg{background:rgba(201,168,76,.16);color:var(--gold);}
#toast{position:fixed;bottom:18px;right:18px;background:rgba(12,11,10,.96);border:1px solid rgba(201,168,76,.2);color:var(--cream);font-family:var(--mono);font-size:11px;padding:10px 16px;border-radius:7px;z-index:1000;transform:translateY(60px);opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
#toast.on{transform:translateY(0);opacity:1;}
#cbdg{display:none;background:var(--gold);color:var(--ink);font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:5px;}
.no-results{grid-column:1/-1;text-align:center;padding:50px;color:rgba(255,255,255,.15);font-family:var(--mono);font-size:11px;letter-spacing:.1em;}
</style>
</head>
<body>
<div id="drop-screen">
  <div><h1>Portfolio Image Manager</h1><p>Add and replace images across all 6 projects</p></div>
  <div id="dz">
    <div class="dz-ico">📂</div>
    <div class="dz-t">Drop your index.html here</div>
    <div class="dz-s">Drag <strong>index.html</strong> here, or click below</div>
    <button class="dbtn" onclick="document.getElementById('fi').click()">&#128193; Browse File</button>
    <input type="file" id="fi" accept=".html">
  </div>
  <p>100% local — your file never leaves your computer</p>
</div>

<div id="main">
  <header class="hdr">
    <div class="hdr-l"><div class="hdr-logo">Image Manager</div><div id="pill">No changes</div></div>
    <div style="display:flex;gap:7px;">
      <button class="hbtn hbtn-o" onclick="document.getElementById('fi').value='';document.getElementById('fi').click()">Load New File</button>
      <button class="hbtn hbtn-p" id="savebtn" onclick="saveFile()" disabled>⬇ Download HTML<span id="cbdg">0</span></button>
    </div>
  </header>
  <div class="layout">
    <nav class="sb" id="sb"></nav>
    <div class="ct">
      <div class="ct-title" id="ct-title">All Images</div>
      <div class="ct-sub" id="ct-sub"></div>
      <div class="filters">
        <button class="fb on" onclick="filt('all',this)">All</button>
        <button class="fb" onclick="filt('empty',this)">Empty</button>
        <button class="fb" onclick="filt('set',this)">Set</button>
        <button class="fb" onclick="filt('changed',this)">Changed</button>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<input type="file" id="ii" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none">

<script>
// ─── state ────────────────────────────────────────────────
var rawHTML='', imgs=[], changes={}, curProj='all', curFilt='all', pendId=null, nChanges=0;

var PROJS=[
  {id:'cards',    name:'Homepage Cards',      color:'#c9a84c'},
  {id:'fargo',    name:'Fargo Gen AI',         color:'#7c3aed'},
  {id:'moneymap', name:'Financial Goals',      color:'#1a4a7a'},
  {id:'merchant', name:'Merchant Services',    color:'#1b4332'},
  {id:'zeuron',   name:'Zeuron Health AI',     color:'#b45309'},
  {id:'drphysio', name:'Dr. Physio',           color:'#1d4ed8'},
  {id:'mimo',     name:'MiMo Console',         color:'#7e22ce'},
];

// Builder → project mapping (strict boundaries)
var BUILDERS=[
  {fn:'buildFargoHTML',   proj:'fargo'},
  {fn:'buildMoneyMapHTML',proj:'moneymap'},
  {fn:'buildMerchantHTML',proj:'merchant'},
  {fn:'buildZeuronHTML',  proj:'zeuron'},
  {fn:'buildDrPhysioHTML',proj:'drphysio'},
  {fn:'buildMiMoHTML',    proj:'mimo'},
];

// ─── drop / file ──────────────────────────────────────────
var dz=document.getElementById('dz');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',function(){dz.classList.remove('over');});
dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('over');var f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.html'))readFile(f);else toast('Drop an .html file');});
document.getElementById('fi').addEventListener('change',function(){if(this.files[0])readFile(this.files[0]);});
function readFile(f){var r=new FileReader();r.onload=function(e){rawHTML=e.target.result;parse();showMain();};r.readAsText(f);}

// ─── parse ────────────────────────────────────────────────
function parse(){
  imgs=[]; changes={}; nChanges=0;
  var html=rawHTML;

  // 1. Card thumbnails — strict pattern
  [
    {id:'hero-img',   lbl:'Fargo Hero Banner',          proj:'cards', sec:'Homepage'},
    {id:'card-img-mm',lbl:'Financial Goals Thumbnail',  proj:'cards', sec:'Homepage'},
    {id:'card-img-mc',lbl:'Merchant Services Thumbnail',proj:'cards', sec:'Homepage'},
    {id:'card-img-ze',lbl:'Zeuron Health AI Thumbnail', proj:'cards', sec:'Homepage'},
    {id:'card-img-dp',lbl:'Dr. Physio Thumbnail',       proj:'cards', sec:'Homepage'},
    {id:'card-img-mo',lbl:'MiMo Console Thumbnail',     proj:'cards', sec:'Homepage'},
  ].forEach(function(d){
    var rx=new RegExp('id="'+d.id+'"[^>]*src="data:image\\/(jpeg|png);base64,([A-Za-z0-9+\\/=]+)"');
    var alt=new RegExp('src="data:image\\/(jpeg|png);base64,([A-Za-z0-9+\\/=]+)"[^>]*id="'+d.id+'"');
    var pos=html.indexOf('id="'+d.id+'"');
    var b64=null,mime='jpeg';
    if(pos!==-1){
      var chunk=html.substring(pos,pos+800);
      var m=chunk.match(/src="data:image\/(jpeg|png);base64,([A-Za-z0-9+\/=]+)"/);
      if(m){mime=m[1];b64=m[2];}
    }
    addImg({uid:d.id,type:'card',lbl:d.lbl,sec:d.sec,proj:d.proj,b64:b64,mime:mime,isSet:!!b64,
            _replaceKey:{type:'card',id:d.id}});
  });

  // 2. Per-builder: scan STRICTLY within each function boundary
  for(var bi=0;bi<BUILDERS.length;bi++){
    var bp=BUILDERS[bi];
    var fnStart=html.indexOf('function '+bp.fn+'(');
    if(fnStart===-1) continue;
    // End = start of next builder or end of IIFE
    var fnEnd=html.length;
    for(var ni=bi+1;ni<BUILDERS.length;ni++){
      var np=html.indexOf('function '+BUILDERS[ni].fn+'(',fnStart+10);
      if(np!==-1){fnEnd=np;break;}
    }
    var body=html.substring(fnStart,fnEnd);

    // A) makeImgFilled with b64 — REAL IMAGES
    var mifRx=/makeImgFilled\(\s*['"]([^'"]+)['"]\s*,\s*['"]([^'"]+)['"]\s*,\s*'data:image\/(jpeg|png);base64,([A-Za-z0-9+\/=\n]+?)'\s*\)/g;
    var m1;
    while((m1=mifRx.exec(body))!==null){
      var lbl=m1[1],ratio=m1[2],mime=m1[3],b64=m1[4].replace(/\n/g,'');
      var uid='MIF_'+bp.proj+'_'+slugify(lbl);
      addImg({uid:uid,type:'mif',lbl:lbl,sec:sectionAt(body,m1.index),proj:bp.proj,
              b64:b64,mime:mime,isSet:true,
              _replaceKey:{type:'mif',lbl:lbl,ratio:ratio,fn:bp.fn,oldMime:mime,oldB64Pre:b64.substring(0,60)}});
    }

    // B) makeImgFilled empty
    var mifERx=/makeImgFilled\(\s*['"]([^'"]+)['"]\s*,\s*['"]([^'"]+)['"]\s*,\s*''\s*\)/g;
    var m2;
    while((m2=mifERx.exec(body))!==null){
      var lbl2=m2[1],ratio2=m2[2];
      var uid2='MFE_'+bp.proj+'_'+slugify(lbl2);
      addImg({uid:uid2,type:'mfe',lbl:lbl2,sec:sectionAt(body,m2.index),proj:bp.proj,
              b64:null,mime:null,isSet:false,
              _replaceKey:{type:'mfe',lbl:lbl2,ratio:ratio2,fn:bp.fn}});
    }

    // C) makeImgPlaceholder
    var mipRx=/makeImgPlaceholder\(\s*["']([^"']+)["']\s*,\s*["']([^"']+)["']\s*\)/g;
    var m3;
    while((m3=mipRx.exec(body))!==null){
      var lbl3=m3[1],ratio3=m3[2];
      var uid3='MIP_'+bp.proj+'_'+slugify(lbl3);
      addImg({uid:uid3,type:'mip',lbl:lbl3,sec:sectionAt(body,m3.index),proj:bp.proj,
              b64:null,mime:null,isSet:false,
              _replaceKey:{type:'mip',lbl:lbl3,ratio:ratio3,fn:bp.fn}});
    }

    // D) Direct src="data:image/..." in JS strings (Fargo, Merchant style)
    var embRx=/src="data:image\/(jpeg|png);base64,([A-Za-z0-9+\/=]+)"/g;
    var m4; var ei=0;
    while((m4=embRx.exec(body))!==null){
      var mime4=m4[1],b64_4=m4[2];
      // Skip if already captured by MIF
      var already=imgs.some(function(i){return i.b64&&i.b64.substring(0,30)===b64_4.substring(0,30)&&i.proj===bp.proj;});
      if(already) continue;
      var uid4=bp.proj+'_emb_'+(ei++);
      addImg({uid:uid4,type:'emb',lbl:sectionAt(body,m4.index)+' — Image '+(ei),
              sec:sectionAt(body,m4.index),proj:bp.proj,b64:b64_4,mime:mime4,isSet:true,
              _replaceKey:{type:'emb',fn:bp.fn,oldMime:mime4,oldB64Pre:b64_4.substring(0,60)}});
    }
  }

  renderSB();renderGrid('all','all');
}

function addImg(o){o.isChanged=false;imgs.push(o);}
function slugify(s){return s.replace(/[^A-Za-z0-9]/g,'_').substring(0,20);}
function sectionAt(body,pos){
  var sec='Content';
  var rx=/ipc-label['""][^>]*>([^<'"]+)/g;
  var m;
  while((m=rx.exec(body.substring(0,pos)))!==null)sec=m[1].replace(/&[a-z]+;/g,'').trim();
  return sec;
}

// ─── sidebar ──────────────────────────────────────────────
function renderSB(){
  var h='<div class="sb-lbl">Projects</div>';
  h+='<div class="sb-item '+(curProj==='all'?'active':'')+'" onclick="selProj(\'all\')">';
  h+='<div class="sb-dot" style="background:rgba(255,255,255,.15)"></div><span>All Images</span><span class="sb-cnt">'+imgs.length+'</span></div>';
  PROJS.forEach(function(p){
    var pi=imgs.filter(function(i){return i.proj===p.id;});
    if(!pi.length) return;
    var em=pi.filter(function(i){return !i.isSet&&!i.isChanged;}).length;
    h+='<div class="sb-item '+(curProj===p.id?'active':'')+'" onclick="selProj(\''+p.id+'\')">';
    h+='<div class="sb-dot" style="background:'+(em?'#facc15':p.color)+'"></div>';
    h+='<span>'+p.name+'</span><span class="sb-cnt">'+pi.length+'</span></div>';
  });
  document.getElementById('sb').innerHTML=h;
}
function selProj(pid){curProj=pid;curFilt='all';document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});document.querySelector('.fb').classList.add('on');renderSB();renderGrid(pid,'all');}

// ─── grid ─────────────────────────────────────────────────
function renderGrid(pid,flt){
  var list=imgs.filter(function(i){
    if(pid!=='all'&&i.proj!==pid) return false;
    if(flt==='empty'&&(i.isSet||i.isChanged)) return false;
    if(flt==='set'&&(!i.isSet||i.isChanged)) return false;
    if(flt==='changed'&&!i.isChanged) return false;
    return true;
  });
  var proj=PROJS.find(function(p){return p.id===pid;});
  document.getElementById('ct-title').textContent=proj?proj.name:'All Images';
  document.getElementById('ct-sub').textContent=list.length+' images · '+list.filter(function(i){return i.isSet||i.isChanged;}).length+' set · '+list.filter(function(i){return !i.isSet&&!i.isChanged;}).length+' empty';
  var g=document.getElementById('grid');
  if(!list.length){g.innerHTML='<div class="no-results">NO IMAGES MATCH</div>';return;}
  g.innerHTML=list.map(function(img){
    var b64=img.b64, isSet=!!b64, isChg=img.isChanged;
    var thumbHtml='';
    if(b64){
      thumbHtml='<img src="data:image/'+(img.mime||'jpeg')+';base64,'+b64+'" alt="">';
    } else {
      thumbHtml='<div class="ph"><div class="ph-ico">📷</div>'
        +'<div class="ph-code">'+img.uid.substring(0,16)+'</div>'
        +'<div class="ph-lbl">'+img.lbl.substring(0,50)+'</div></div>';
    }
    var bdg=isChg?'<span class="bdg b-chg">✓ Changed</span>':isSet?'<span class="bdg b-set">Set</span>':'<span class="bdg b-empty">Empty</span>';
    var ovTxt=isSet?'✏ Replace':'+ Add Image';
    return '<div class="card" onclick="trigUp(\''+img.uid+'\')">'
      +'<div class="thumb">'+thumbHtml+'<div class="ov"><div class="ov-btn">'+ovTxt+'</div></div>'+bdg+'</div>'
      +'<div class="info"><div class="lbl">'+img.lbl.substring(0,50)+(img.lbl.length>50?'…':'')+'</div>'
      +'<div class="sec">'+img.sec+'</div></div></div>';
  }).join('');
}
function filt(f,btn){curFilt=f;document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');renderGrid(curProj,f);}

// ─── upload ───────────────────────────────────────────────
function trigUp(uid){pendId=uid;var ii=document.getElementById('ii');ii.value='';ii.click();}
document.getElementById('ii').addEventListener('change',function(){
  var file=this.files[0];if(!file||!pendId) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var mime=file.type.match(/\/(jpeg|png|webp|gif)/);
    mime=mime?mime[1]:'jpeg';
    var b64=e.target.result.split(',')[1];
    var img=imgs.find(function(i){return i.uid===pendId;});
    if(img){img.b64=b64;img.mime=mime;img.isSet=true;img.isChanged=true;}
    nChanges++;updateStatus();renderSB();renderGrid(curProj,curFilt);
    toast('✓ '+(img?img.lbl.substring(0,34):pendId));
  };
  reader.readAsDataURL(file);
});

// ─── save ─────────────────────────────────────────────────
function saveFile(){
  if(!nChanges) return;
  var html=rawHTML;

  imgs.filter(function(i){return i.isChanged;}).forEach(function(img){
    var nb=img.b64, nm=img.mime||'jpeg';
    var rk=img._replaceKey;

    if(rk.type==='card'){
      // Replace src in id="XX" element
      var pos=html.indexOf('id="'+rk.id+'"');
      if(pos===-1) return;
      var chunk=html.substring(pos,pos+900);
      var m=chunk.match(/src="data:image\/(jpeg|png);base64,([A-Za-z0-9+\/=]+)"/);
      if(m){
        html=html.substring(0,pos)+html.substring(pos).replace(m[0],'src="data:image/'+nm+';base64,'+nb+'"');
      } else {
        // No existing image — insert src
        var qp=html.indexOf('>',pos);
        html=html.substring(0,pos)+'id="'+rk.id+'" src="data:image/'+nm+';base64,'+nb+'"'+html.substring(pos+('id="'+rk.id+'"').length);
      }

    } else if(rk.type==='mif'){
      // makeImgFilled with existing b64 — replace the b64 only
      // Find by label + old b64 prefix
      var searchStr="makeImgFilled('"+rk.lbl+"', '"+rk.ratio+"', 'data:image/"+rk.oldMime+";base64,"+rk.oldB64Pre;
      var p=html.indexOf(searchStr);
      if(p!==-1){
        var end=html.indexOf("')",p+searchStr.length);
        html=html.substring(0,p)+"makeImgFilled('"+rk.lbl+"', '"+rk.ratio+"', 'data:image/"+nm+";base64,"+nb+"')"+html.substring(end+2);
      }

    } else if(rk.type==='mfe'){
      // makeImgFilled empty → fill with b64
      var targets=["makeImgFilled('"+rk.lbl+"', '"+rk.ratio+"', '')",
                   'makeImgFilled("'+rk.lbl+'", "'+rk.ratio+'", "")'];
      var rep="makeImgFilled('"+rk.lbl+"', '"+rk.ratio+"', 'data:image/"+nm+";base64,"+nb+"')";
      for(var ti=0;ti<targets.length;ti++){
        if(html.indexOf(targets[ti])!==-1){html=html.replace(targets[ti],rep);break;}
      }

    } else if(rk.type==='mip'){
      // makeImgPlaceholder → convert to makeImgFilled
      var targets2=["makeImgPlaceholder('"+rk.lbl+"', '"+rk.ratio+"')",
                    'makeImgPlaceholder("'+rk.lbl+'", "'+rk.ratio+'")'];
      var rep2="makeImgFilled('"+rk.lbl+"', '"+rk.ratio+"', 'data:image/"+nm+";base64,"+nb+"')";
      for(var ti2=0;ti2<targets2.length;ti2++){
        if(html.indexOf(targets2[ti2])!==-1){html=html.replace(targets2[ti2],rep2);break;}
      }

    } else if(rk.type==='emb'){
      // Direct src="data:image/..." — replace by b64 prefix
      var oldSrc='src="data:image/'+rk.oldMime+';base64,'+rk.oldB64Pre;
      var ep=html.indexOf(oldSrc);
      if(ep!==-1){
        var endQ=html.indexOf('"',ep+oldSrc.length);
        html=html.substring(0,ep)+'src="data:image/'+nm+';base64,'+nb+'"'+html.substring(endQ+1);
      }
    }
  });

  var blob=new Blob([html],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='index.html';a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded! '+nChanges+' change'+(nChanges!==1?'s':'')+' applied.');
}

// ─── utils ────────────────────────────────────────────────
function showMain(){document.getElementById('drop-screen').style.display='none';document.getElementById('main').style.display='block';}
function updateStatus(){
  var b=document.getElementById('cbdg'),pill=document.getElementById('pill'),btn=document.getElementById('savebtn');
  b.textContent=nChanges;b.style.display=nChanges?'inline':'none';btn.disabled=!nChanges;
  if(!nChanges){pill.textContent='No changes';pill.style.color='var(--gold)';}
  else{pill.textContent=nChanges+' change'+(nChanges!==1?'s':'');pill.style.color='#4ade80';}
}
var tt;
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(tt);tt=setTimeout(function(){el.classList.remove('on');},3200);}
</script>
